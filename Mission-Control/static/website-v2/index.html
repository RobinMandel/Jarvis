<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>robinmandel.de — Finde deinen Beruf</title>
<meta name="viewport" content="width=1440" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap">
<link rel="stylesheet" href="site/shared.css?v=9">
<style>
  /* ---------- Hero ---------- */
  .hero { padding: 72px 0 80px; position: relative; }
  .hero-grid {
    display: grid; grid-template-columns: 1.3fr 1fr; gap: 80px; align-items: end;
  }
  .hero h1 {
    font-family: var(--display); font-weight: 500;
    font-size: 104px; line-height: 0.94; letter-spacing: -0.03em;
    color: var(--ink);
  }
  .hero h1 em {
    font-style: italic; color: var(--accent); font-weight: 500;
  }
  .hero-eyebrow {
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--ink-dim); margin-bottom: 28px;
    display: flex; align-items: center; gap: 12px;
  }
  .hero-eyebrow::before {
    content: ''; width: 32px; height: 1px; background: var(--accent);
  }
  .hero-sub {
    margin-top: 36px; font-size: 19px; line-height: 1.55;
    color: var(--ink-2); max-width: 480px; text-wrap: pretty;
  }
  .hero-cta { margin-top: 44px; display: flex; gap: 14px; align-items: center; }
  .hero-aside {
    padding-bottom: 8px;
  }
  .hero-aside-card {
    border: 0.5px solid var(--rule);
    padding: 24px;
    background: var(--paper-2);
    position: relative;
  }
  .hero-aside-card h3 {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--ink-dim); margin-bottom: 18px;
  }
  .quicktest-q {
    font-family: var(--display); font-size: 22px; font-weight: 500;
    line-height: 1.15; letter-spacing: -0.01em; margin-bottom: 20px;
    text-wrap: balance;
  }
  .quicktest-opts { display: flex; flex-direction: column; gap: 8px; }
  .quicktest-btn {
    text-align: left; width: 100%;
    padding: 14px 16px;
    border: 0.5px solid var(--rule);
    background: var(--paper);
    font-family: var(--sans); font-size: 14px;
    color: var(--ink-2);
    cursor: pointer; transition: all 0.15s;
    display: flex; justify-content: space-between; align-items: center;
  }
  .quicktest-btn:hover { border-color: var(--ink); background: var(--ink); color: var(--paper); }
  .quicktest-btn .num {
    font-family: var(--mono); font-size: 10px; color: var(--ink-faint);
    letter-spacing: 0.1em;
  }
  .quicktest-btn:hover .num { color: var(--paper-2); }
  .hero-stats {
    margin-top: 48px;
    display: grid; grid-template-columns: repeat(4, 1fr);
    border-top: 0.5px solid var(--rule);
    border-bottom: 0.5px solid var(--rule);
  }
  .hero-stat {
    padding: 22px 24px;
    border-right: 0.5px solid var(--rule);
  }
  .hero-stat:last-child { border-right: none; }
  .hero-stat .num {
    font-family: var(--display); font-size: 32px; font-weight: 500;
    letter-spacing: -0.02em; line-height: 1; color: var(--ink);
    display: block; margin-bottom: 6px;
  }
  .hero-stat .lbl {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--ink-dim);
  }

  /* ---------- Section scaffolding ---------- */
  .section { padding: 80px 0; }
  .section-head {
    display: grid; grid-template-columns: 1fr 1fr; gap: 40px;
    align-items: end; margin-bottom: 48px;
  }
  .section-head h2 {
    font-family: var(--display); font-weight: 500; font-size: 56px;
    letter-spacing: -0.025em; line-height: 1; color: var(--ink);
    text-wrap: balance;
  }
  .section-head-aside { color: var(--ink-dim); font-size: 15px; line-height: 1.6; max-width: 440px; text-wrap: pretty; }

  /* ---------- Berufe grid ---------- */
  .beruf-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0;
    border-top: 0.5px solid var(--rule);
    border-left: 0.5px solid var(--rule);
  }
  .beruf-card {
    padding: 28px;
    border-right: 0.5px solid var(--rule);
    border-bottom: 0.5px solid var(--rule);
    background: var(--paper);
    transition: background 0.2s;
    display: flex; flex-direction: column; gap: 14px;
    min-height: 220px;
    position: relative;
  }
  .beruf-card:hover { background: var(--paper-2); }
  .beruf-card:hover .beruf-arrow { transform: translate(4px,-4px); }
  .beruf-card .kat {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--ink-faint);
  }
  .beruf-card h3 {
    font-family: var(--display); font-size: 24px; font-weight: 500;
    letter-spacing: -0.015em; line-height: 1.1; color: var(--ink);
  }
  .beruf-card p {
    font-size: 13px; line-height: 1.55; color: var(--ink-dim);
    flex: 1;
  }
  .beruf-card .facts {
    display: flex; gap: 16px;
    padding-top: 12px;
    border-top: 0.5px dashed var(--rule);
    font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.06em; color: var(--ink-2);
  }
  .beruf-arrow {
    position: absolute; top: 24px; right: 24px;
    transition: transform 0.2s;
    color: var(--ink-faint);
  }
  .beruf-card:hover .beruf-arrow { color: var(--accent); }

  /* ---------- Test promo ---------- */
  .test-promo {
    background: var(--ink); color: var(--paper);
    padding: 80px 56px; position: relative; overflow: hidden;
    display: grid; grid-template-columns: 1.2fr 1fr; gap: 56px; align-items: center;
  }
  [data-theme='dark'] .test-promo { background: var(--paper-2); color: var(--ink); }
  .test-promo h2 {
    font-family: var(--display); font-size: 72px; font-weight: 500;
    letter-spacing: -0.025em; line-height: 0.98; text-wrap: balance;
  }
  .test-promo h2 em { font-style: italic; color: var(--accent); }
  .test-promo p { font-size: 16px; line-height: 1.6; margin-top: 24px; max-width: 520px; color: color-mix(in srgb, var(--paper) 85%, transparent); }
  [data-theme='dark'] .test-promo p { color: var(--ink-dim); }
  .test-promo .cta { margin-top: 36px; display: flex; gap: 14px; }
  .test-promo .btn-primary { background: var(--accent); color: var(--ink); }
  .test-promo .btn-primary:hover { background: var(--paper); }
  .test-promo .btn-ghost { border-color: var(--paper); color: var(--paper); }
  [data-theme='dark'] .test-promo .btn-ghost { border-color: var(--ink); color: var(--ink); }
  .test-promo .btn-ghost:hover { background: var(--paper); color: var(--ink); }
  .test-promo-visual {
    position: relative;
    aspect-ratio: 1;
    border: 0.5px solid color-mix(in srgb, var(--paper) 30%, transparent);
    padding: 24px;
  }
  [data-theme='dark'] .test-promo-visual { border-color: var(--rule); }
  .test-promo-visual-grid {
    display: grid; grid-template-columns: repeat(5,1fr); gap: 8px;
    height: 100%;
  }
  .tpv-cell {
    border: 0.5px solid color-mix(in srgb, var(--paper) 20%, transparent);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 22px; color: var(--accent);
  }
  [data-theme='dark'] .tpv-cell { border-color: var(--rule); }
  .tpv-cell.active {
    background: color-mix(in srgb, var(--paper) 8%, transparent);
    border-color: var(--accent);
  }

  /* ---------- Editorial feature ---------- */
  .editorial {
    display: grid; grid-template-columns: 5fr 7fr; gap: 64px; align-items: start;
  }
  .editorial-img {
    aspect-ratio: 4/5;
  }
  .editorial h3 {
    font-family: var(--display); font-size: 48px; font-weight: 500;
    letter-spacing: -0.02em; line-height: 1.02; color: var(--ink);
    margin-bottom: 20px; text-wrap: balance;
  }
  .editorial-meta {
    display: flex; gap: 18px; margin-bottom: 28px; font-family: var(--mono);
    font-size: 10px; letter-spacing: 0.2em; color: var(--ink-dim);
    text-transform: uppercase;
  }
  .editorial p {
    font-size: 16px; line-height: 1.65; color: var(--ink-2);
    margin-bottom: 18px; text-wrap: pretty;
  }
  .editorial-quote {
    margin: 28px 0; padding: 20px 0 20px 24px;
    border-left: 2px solid var(--accent);
    font-family: var(--display); font-size: 22px; font-weight: 500;
    line-height: 1.25; letter-spacing: -0.01em;
    color: var(--ink); text-wrap: balance;
  }

  /* ---------- Jobbörsen ---------- */
  .joblist {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 0;
    border-top: 0.5px solid var(--rule);
    border-left: 0.5px solid var(--rule);
  }
  .joblist a {
    padding: 28px 32px;
    border-right: 0.5px solid var(--rule);
    border-bottom: 0.5px solid var(--rule);
    display: flex; justify-content: space-between; align-items: center;
    transition: background 0.15s;
  }
  .joblist a:hover { background: var(--paper-2); }
  .joblist a:hover .jl-name { color: var(--accent); }
  .jl-name {
    font-family: var(--display); font-size: 26px; font-weight: 500;
    letter-spacing: -0.01em; transition: color 0.15s;
  }
  .jl-desc { font-size: 13px; color: var(--ink-dim); margin-top: 4px; }
  .jl-arrow { color: var(--ink-faint); transition: transform 0.15s; }
  .joblist a:hover .jl-arrow { color: var(--accent); transform: translate(4px,-4px); }
</style>
</head>
