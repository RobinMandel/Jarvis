<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>Berufstest — robinmandel.de</title>
<meta name="viewport" content="width=1440" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap">
<link rel="stylesheet" href="site/shared.css?v=9">
<style>
  .test-wrap { max-width: 840px; margin: 0 auto; padding: 72px 40px 80px; }
  .test-intro h1 {
    font-family: var(--display); font-size: 88px; font-weight: 500;
    letter-spacing: -0.03em; line-height: 0.95; text-wrap: balance;
  }
  .test-intro h1 em { font-style: italic; color: var(--accent); }
  .test-intro p { font-size: 17px; line-height: 1.6; color: var(--ink-2); margin-top: 28px; max-width: 620px; text-wrap: pretty; }
  .test-intro .steps {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px;
    margin: 48px 0 40px;
  }
  .test-intro .step { padding-top: 20px; border-top: 0.5px solid var(--rule); }
  .test-intro .step .n {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em;
    color: var(--ink-dim); margin-bottom: 10px;
  }
  .test-intro .step h4 {
    font-family: var(--display); font-size: 18px; font-weight: 500;
    letter-spacing: -0.01em; margin-bottom: 6px;
  }
  .test-intro .step p { font-size: 13px; color: var(--ink-dim); margin-top: 0; line-height: 1.55; }

  /* Fragebogen */
  .test-progress {
    position: sticky; top: 64px; z-index: 20;
    background: var(--paper);
    border-bottom: 0.5px solid var(--rule);
    padding: 16px 0;
  }
  .test-progress-inner {
    max-width: 840px; margin: 0 auto; padding: 0 40px;
    display: flex; align-items: center; gap: 18px;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em;
    color: var(--ink-dim); text-transform: uppercase;
  }
  .progress-bar {
    flex: 1; height: 2px; background: var(--rule); position: relative;
  }
  .progress-bar-fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: var(--accent); transition: width 0.3s;
  }

  .question-block {
    padding: 56px 0 40px;
  }
  .question-num {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em;
    color: var(--ink-dim); text-transform: uppercase; margin-bottom: 16px;
  }
  .question-text {
    font-family: var(--display); font-size: 46px; font-weight: 500;
    letter-spacing: -0.02em; line-height: 1.08; color: var(--ink);
    margin-bottom: 40px; text-wrap: balance;
  }
  .answer-list { display: flex; flex-direction: column; gap: 10px; }
  .answer-btn {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px;
    border: 0.5px solid var(--rule);
    background: var(--paper);
    font-family: var(--sans); font-size: 16px; color: var(--ink);
    cursor: pointer; transition: all 0.15s; text-align: left;
    line-height: 1.4;
  }
  .answer-btn:hover {
    border-color: var(--ink);
    background: var(--paper-2);
  }
  .answer-btn.selected {
    background: var(--ink); color: var(--paper); border-color: var(--ink);
  }
  .answer-btn .key {
    font-family: var(--mono); font-size: 11px; color: var(--ink-faint);
    letter-spacing: 0.1em;
    min-width: 20px;
  }
  .answer-btn.selected .key { color: var(--paper-2); }

  .test-controls {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 32px; border-top: 0.5px solid var(--rule);
    margin-top: 32px;
  }
  .btn-nav {
    padding: 10px 16px;
    font-family: var(--mono); font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-dim); background: none; border: none;
    cursor: pointer;
  }
  .btn-nav:hover { color: var(--ink); }
  .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Ergebnis */
  .result-head {
    padding: 56px 0 40px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 56px;
    align-items: end;
  }
  .result-head h1 {
    font-family: var(--display); font-size: 72px; font-weight: 500;
    letter-spacing: -0.03em; line-height: 0.95; text-wrap: balance;
  }
  .result-head h1 em { font-style: italic; color: var(--accent); }
  .result-head p { font-size: 15px; color: var(--ink-dim); line-height: 1.6; }

  .profile-chart {
    padding: 32px; border: 0.5px solid var(--rule); background: var(--paper-2);
    margin-bottom: 48px;
  }
  .profile-bar { display: grid; grid-template-columns: 160px 1fr 40px; align-items: center; gap: 16px; margin-bottom: 14px; }
  .profile-bar .lbl { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-dim); }
  .profile-bar .bar-track { height: 6px; background: var(--rule); position: relative; }
  .profile-bar .bar-fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(--accent); transition: width 0.8s cubic-bezier(0.2, 0.8, 0.3, 1); }
  .profile-bar .val { font-family: var(--mono); font-size: 11px; color: var(--ink); text-align: right; }

  .match-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 0;
    border-top: 0.5px solid var(--rule); border-left: 0.5px solid var(--rule);
  }
  .match-card {
    padding: 28px;
    border-right: 0.5px solid var(--rule); border-bottom: 0.5px solid var(--rule);
    text-decoration: none; color: inherit;
    display: grid; grid-template-columns: 1fr auto; gap: 12px;
    transition: background 0.15s; cursor: pointer;
  }
  .match-card:hover { background: var(--paper-2); }
  .match-card h3 { font-family: var(--display); font-size: 22px; font-weight: 500; letter-spacing: -0.01em; }
  .match-card .kat { font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 6px; }
  .match-score {
    font-family: var(--display); font-size: 34px; font-weight: 500;
    letter-spacing: -0.02em; color: var(--accent);
    align-self: start;
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="site/shared.jsx?v=9"></script>
<script type="text/babel" src="site/berufstest-page.jsx?v=9"></script>

</body>
</html>
